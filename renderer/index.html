<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anceps Renderer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">CONNECTING TO INFERENCE...</div>
    <script>
        let currentImage;
        let socket;
        let statusDiv;
        let imageQueue = [];
        let lastFrameTime = 0;
        let frameDelay = 100; // 100ms jitter buffer
        let intensity = 0;

        // Simple Shader source
        const vert = `
            attribute vec3 aPosition;
            attribute vec2 aTexCoord;
            varying vec2 vTexCoord;
            void main() {
                vTexCoord = aTexCoord;
                vec4 positionVec4 = vec4(aPosition, 1.0);
                positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
                gl_Position = positionVec4;
            }
        `;

        const frag = `
            precision mediump float;
            varying vec2 vTexCoord;
            uniform sampler2D tex0;
            uniform float intensity;

            void main() {
                vec2 uv = vTexCoord;
                float aberration = 0.01 * intensity;
                
                vec4 r = texture2D(tex0, uv + vec2(aberration, 0.0));
                vec4 g = texture2D(tex0, uv);
                vec4 b = texture2D(tex0, uv - vec2(aberration, 0.0));
                
                vec4 color = vec4(r.r, g.g, b.b, 1.0);
                
                // Simple Bloom
                float brightness = dot(color.rgb, vec3(0.2126, 0.7152, 0.0722));
                if(brightness > 0.8) {
                    color += color * intensity * 0.5;
                }
                
                gl_FragColor = color;
            }
        `;

        let postProcess;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            postProcess = createShader(vert, frag);
            statusDiv = document.getElementById('status');
            connectWebsocket();
        }

        function connectWebsocket() {
            const urlParams = new URLSearchParams(window.location.search);
            const backendParam = urlParams.get('backend');
            let backendUrl = backendParam || (window.ANCEPS_CONFIG && window.ANCEPS_CONFIG.backendUrl);
            
            if (!backendUrl) {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                backendUrl = `${protocol}//${window.location.host}/ws`;
                if (window.location.protocol === 'file:') backendUrl = 'ws://localhost:8000/ws';
            } else {
                if (!backendUrl.endsWith('/ws')) backendUrl = backendUrl.replace(/\/$/, '') + '/ws';
                if (!backendUrl.startsWith('ws')) {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    backendUrl = backendUrl.replace(/^http(s)?:\/\//, protocol + '//');
                }
            }

            console.log('Connecting:', backendUrl);
            socket = new WebSocket(backendUrl);
            socket.onopen = () => { statusDiv.innerText = 'CONNECTED'; statusDiv.style.color = '#0f0'; };
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'image' && data.payload) {
                    loadImage('data:image/png;base64,' + data.payload, img => {
                        imageQueue.push({img, time: millis(), intensity: data.metadata?.intensity || 0.5});
                    });
                }
            };
            socket.onclose = () => { statusDiv.innerText = 'DISCONNECTED - RETRYING...'; statusDiv.style.color = '#f00'; setTimeout(connectWebsocket, 2000); };
        }

        function draw() {
            background(0);
            
            // Jitter Buffer Logic
            if (imageQueue.length > 0) {
                const now = millis();
                // If current item in queue has been buffered long enough
                if (now - imageQueue[0].time > frameDelay) {
                    const next = imageQueue.shift();
                    currentImage = next.img;
                    intensity = next.intensity;
                }
            }

            if (currentImage) {
                shader(postProcess);
                postProcess.setUniform('tex0', currentImage);
                postProcess.setUniform('intensity', intensity);
                
                // Draw plane to fill canvas
                rect(-width/2, -height/2, width, height);
            } else {
                // Placeholder
                resetShader();
                noFill();
                stroke(0, 255, 0, 50);
                ellipse(0, 0, sin(frameCount * 0.05) * 200 + 300);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
